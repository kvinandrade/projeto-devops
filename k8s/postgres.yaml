apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: pedidos-veloz
spec:
  selector:
    app: postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: pedidos-veloz
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pedidos-veloz-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pedidos-veloz-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: pedidos-veloz-config
                  key: POSTGRES_DB
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pedidos"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: postgres-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: pedidos-veloz
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS pedidos (
        id UUID PRIMARY KEY,
        cliente_id VARCHAR(64) NOT NULL,
        itens JSONB NOT NULL,
        valor_total NUMERIC(12, 2) NOT NULL,
        status VARCHAR(32) NOT NULL DEFAULT 'CRIADO',
        pagamento_id VARCHAR(64),
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS estoque (
        sku VARCHAR(64) PRIMARY KEY,
        nome VARCHAR(128) NOT NULL,
        quantidade INTEGER NOT NULL CHECK (quantidade >= 0),
        updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    CREATE TABLE IF NOT EXISTS pagamentos (
        id UUID PRIMARY KEY,
        pedido_id UUID NOT NULL,
        valor NUMERIC(12, 2) NOT NULL,
        status VARCHAR(32) NOT NULL,
        provedor VARCHAR(64) NOT NULL DEFAULT 'mock-acquirer',
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );
    INSERT INTO estoque (sku, nome, quantidade) VALUES
        ('SKU-CAMISA-P', 'Camisa Básica P', 50),
        ('SKU-CAMISA-M', 'Camisa Básica M', 80),
        ('SKU-TENIS-42', 'Tênis Runner 42', 30),
        ('SKU-MOCHILA', 'Mochila Urban', 25)
    ON CONFLICT (sku) DO NOTHING;
