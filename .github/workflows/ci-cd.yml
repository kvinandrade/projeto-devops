name: CI/CD Pedidos Veloz

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/lojaveloz

jobs:
  lint-test:
    name: Lint e testes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, pedidos, pagamentos, estoque]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package.json

      - name: Instalar dependências
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Testes unitários
        working-directory: services/${{ matrix.service }}
        run: npm test

      - name: Validação básica de sintaxe
        working-directory: services/${{ matrix.service }}
        run: node --check src/index.js

  build-and-push:
    name: Build e publicação de imagens
    needs: lint-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - service: pedidos
            dockerfile: services/pedidos/Dockerfile
          - service: pagamentos
            dockerfile: services/pagamentos/Dockerfile
          - service: estoque
            dockerfile: services/estoque/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=1.0.0
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Scan opcional de imagem
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        service: [api-gateway, pedidos]
    steps:
      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH

  deploy-staging:
    name: Gate de deploy (staging)
    needs: [build-and-push, security-scan]
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - uses: actions/checkout@v4

      - name: Validar manifests Kubernetes
        run: |
          # Sem cluster no runner: valida YAML estruturalmente
          python - <<'PY'
          import yaml, pathlib, sys
          root = pathlib.Path("k8s")
          for path in sorted(root.glob("*.yaml")):
              if path.name == "kustomization.yaml":
                  continue
              docs = list(yaml.safe_load_all(path.read_text(encoding="utf-8")))
              assert docs, f"vazio: {path}"
              print(f"OK {path.name} ({len(docs)} docs)")
          print("Manifests válidos")
          PY

      - name: Confirmar estratégia de deploy
        run: |
          echo "Deploy strategy: RollingUpdate (maxUnavailable=0, maxSurge=1)"
          echo "Apply: kubectl apply -k k8s/"
